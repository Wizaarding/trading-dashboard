<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trading Dashboard</title>
<style>
body{font-family:Arial;background:#f5f5f5;max-width:420px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;border-radius:14px;margin-bottom:10px}
button{width:100%;padding:12px;border:none;border-radius:12px;background:#111;color:#fff;font-weight:bold}
.loading{text-align:center;color:#777}
</style>
</head>
<body>

<h2>Mariam's Trading Dashboard</h2>
<div id="stocks"><div class="loading">Loading live prices...</div></div>
<button onclick="loadStocks()">Refresh</button>

<script>
const stocks = ['AMD','NVDA','AVGO','MU','ASML'];

async function getStock(ticker){
 const r = await fetch('/api/stock?ticker=' + ticker);
 return await r.json();
}

function render(t,d){
 if(!d.chart || !d.chart.result) return `<div class='card'>${t} failed</div>`;

 let close = d.chart.result[0].indicators.quote[0].close.filter(Boolean);
 let price = close[close.length-1];
 let prev = close[close.length-2];
 let change = ((price-prev)/prev*100).toFixed(2);

 return `
 <div class="card">
 <b>${ticker=t}</b><br>
 $${price.toFixed(2)}<br>
 ${change>0?'+':''}${change}%
 </div>`;
}

async function loadStocks(){
 document.getElementById('stocks').innerHTML='<div class="loading">Fetching...</div>';
 let data = await Promise.all(stocks.map(getStock));
 document.getElementById('stocks').innerHTML =
 stocks.map((s,i)=>render(s,data[i])).join('');
}

loadStocks();
setInterval(loadStocks,60000);
</script>

</body>
</html>
